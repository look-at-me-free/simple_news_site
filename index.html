<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Longscroll Viewer</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Main gallery container */
    #gallery {
      width: 100%;
    }

    /* Each page (each screenshot) */
    .page {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* ensures TOP is shown first */
    }

    /* Image wrapper */
    .viewer {
      width: 100%;
      max-width: 1200px; /* optional cap for readability */
      background: #000;
    }

    /* The long screenshot */
    .viewer img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Optional subtle separation between pages */
    .page + .page {
      margin-top: 24px;
    }

    /* Loading text */
    .loading {
      padding: 40px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div id="gallery">
    <div class="loading">Loading pages…</div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
