name: Build gallery index

on:
  push:
    paths:
      - 'uploaded_directories/**/*.json'
      - '.github/workflows/build-gallery-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gallery-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate combined gallery index
        shell: bash
        run: |
          mkdir -p generated

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const uploadedDir = path.join(process.cwd(), 'uploaded_directories');
          const outputDir = path.join(process.cwd(), 'generated');
          const outputFile = path.join(outputDir, 'gallery-index.json');

          function slugify(value) {
            return String(value)
              .toLowerCase()
              .replace(/\.json$/i, '')
              .replace(/[_\s]+/g, '-')
              .replace(/[^a-z0-9-]/g, '-')
              .replace(/-+/g, '-')
              .replace(/^-|-$/g, '');
          }

          function titleCase(value) {
            return String(value)
              .replace(/[-_]+/g, ' ')
              .replace(/\s+/g, ' ')
              .trim()
              .replace(/\b\w/g, c => c.toUpperCase());
          }

          function walkJsonFiles(dir) {
            if (!fs.existsSync(dir)) return [];
            const results = [];

            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...walkJsonFiles(full));
              } else if (entry.isFile() && entry.name.toLowerCase().endsWith('.json')) {
                results.push(full);
              }
            }

            return results.sort((a, b) => a.localeCompare(b));
          }

          function deriveTitle(json, filePath) {
            if (json.title && typeof json.title === 'string' && json.title.trim()) {
              return json.title.trim();
            }

            if (json.local_r2_root && typeof json.local_r2_root === 'string') {
              const normalized = json.local_r2_root.replace(/\\/g, '/');
              const last = normalized.split('/').filter(Boolean).pop();
              if (last) return titleCase(last);
            }

            if (Array.isArray(json.files) && json.files.length > 0) {
              const firstPath = json.files[0]?.path;
              if (typeof firstPath === 'string' && firstPath.includes('/')) {
                const firstFolder = firstPath.split('/').filter(Boolean)[0];
                if (firstFolder) return titleCase(firstFolder);
              }
            }

            return titleCase(path.basename(filePath, '.json'));
          }

          function deriveSlug(title, filePath, usedSlugs) {
            let base = slugify(title) || slugify(path.basename(filePath, '.json')) || 'gallery';
            let slug = base;
            let i = 2;

            while (usedSlugs.has(slug)) {
              slug = `${base}-${i}`;
              i += 1;
            }

            usedSlugs.add(slug);
            return slug;
          }

          const files = walkJsonFiles(uploadedDir);
          const usedSlugs = new Set();

          const galleries = files.map(filePath => {
            const raw = fs.readFileSync(filePath, 'utf8');
            const json = JSON.parse(raw);

            const title = deriveTitle(json, filePath);
            const slug = deriveSlug(title, filePath, usedSlugs);

            const relativeSource = path
              .relative(process.cwd(), filePath)
              .replace(/\\/g, '/');

            const links = Array.isArray(json.links) ? json.links : [];
            const fileCount =
              typeof json.total_files === 'number'
                ? json.total_files
                : Array.isArray(json.files)
                  ? json.files.length
                  : links.length;

            return {
              slug,
              title,
              source: relativeSource,
              generated_from_filename: path.basename(filePath),
              image_count: links.length,
              total_files: fileCount,
              links
            };
          });

          const output = {
            generated_utc: new Date().toISOString(),
            gallery_count: galleries.length,
            galleries
          };

          fs.mkdirSync(outputDir, { recursive: true });
          fs.writeFileSync(outputFile, JSON.stringify(output, null, 2) + '\n', 'utf8');

          console.log(`Wrote ${outputFile}`);
          console.log(`Indexed ${galleries.length} gallery JSON file(s).`);
          NODE

      - name: Commit generated index
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add generated/gallery-index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update generated gallery index"
          git push
